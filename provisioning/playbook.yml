---
- name: Configure hosts
  hosts: all
  become: yes
  roles:
    - hosts
    - hosts-aliases
    - chrony

- name: Configure attacker
  hosts: attacker
  become: yes
  roles:
    - attacker

- name: Configure client
  hosts: client
  become: yes
  roles:
    - client

- name: Configure server
  hosts: server
  become: yes
  roles:
    - server

- name: Configure sandbox logging
  hosts: all
  become: yes
  roles:
    - sandbox-logging

---
- name: Install analyst tools
  apt:
    name:
      - python3
      - net-tools
      - iproute2
      - psmisc
      - lsof
      - tcpdump
      - nmap
      - tree
      - auditd
    state: present
    update_cache: yes

- name: Create analyst training user
  user:
    name: analyst
    password: '$6$r5XJ6myGyV8KQb5J$NWwB9woi6jw50RRiFUtHMJsZwAjeMt/c8vo3whUQ2LYoI5vAQY2BTlgokwj4zXQEf8S42P8N5u9pmNO3rOvj60'
    shell: /bin/bash
    groups: sudo
    append: true

- name: Allow analyst sudo without password
  copy:
    dest: /etc/sudoers.d/90-morris-analyst
    content: "analyst ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: '0440'

- name: Create investigation directory
  file:
    path: /home/analyst/investigation
    state: directory
    owner: analyst
    group: analyst
    mode: '0755'

- name: Add investigation questions
  copy:
    dest: /home/analyst/investigation/questions.txt
    owner: analyst
    group: analyst
    mode: '0644'
    content: |
      Morris Worm Investigation
      Username: analyst
      Password: analyst
      1. Which victim hosts are listening on TCP port 9999?
      2. Which process is responsible for port 9999?
      3. After the attacker runs worm_sim.py, which artifact file appears under /opt/morris on a victim?
      4. Use stat to compare mtime/ctime/atime of worm-related artifacts.
      5. Find the flag files on victims after you confirm the evidence.

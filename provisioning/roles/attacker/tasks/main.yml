---
- name: Install attacker tools
  apt:
    name:
      - python3
      - netcat-openbsd
      - nmap
      - tcpdump
      - iputils-ping
    state: present
    update_cache: yes

- name: Create lab directory
  file:
    path: /home/debian/morris
    state: directory
    owner: debian
    group: debian
    mode: '0755'

- name: Copy safe worm simulator
  copy:
    src: worm_sim.py
    dest: /home/debian/morris/worm_sim.py
    owner: debian
    group: debian
    mode: '0755'

- name: Add attacker notes
  copy:
    dest: /home/debian/morris/README.txt
    owner: debian
    group: debian
    mode: '0644'
    content: |
      Morris Worm Lab - Attacker VM
      This VM contains a SAFE simulator, not a real worm.
      Run: cd ~/morris && ./worm_sim.py
      Observe victims from the analyst VM with ps, ss, netstat, stat, and logs.

---
- name: Install victim tools
  apt:
    name:
      - python3
      - netcat-openbsd
      - net-tools
      - psmisc
      - iputils-ping
    state: present
    update_cache: yes

- name: Create morris directory
  file:
    path: /opt/morris
    state: directory
    mode: '0755'

- name: Copy victim listener
  copy:
    src: victim_listener.py
    dest: /opt/morris/victim_listener.py
    mode: '0755'

- name: Install victim service
  template:
    src: morris-victim.service.j2
    dest: /etc/systemd/system/morris-victim.service
  notify: Restart morris victim

- name: Enable victim service
  systemd:
    name: morris-victim.service
    enabled: true
    state: started
    daemon_reload: true

- name: Place victim flag
  copy:
    dest: /root/flag.txt
    content: "{{ victim_flag }}\n"
    owner: root
    group: root
    mode: '0600'

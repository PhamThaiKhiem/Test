name: morris-worm

hosts:
  - name: attacker
    base_box:
      image: kali
      mgmt_user: debian
    flavor: standard.small

  - name: analyst
    base_box:
      image: ubuntu-20.04
      mgmt_user: ubuntu
    flavor: standard.small

  - name: victim1
    base_box:
      image: ubuntu-20.04
      mgmt_user: ubuntu
    flavor: standard.small

  - name: victim2
    base_box:
      image: ubuntu-20.04
      mgmt_user: ubuntu
    flavor: standard.small

  - name: victim3
    base_box:
      image: ubuntu-20.04
      mgmt_user: ubuntu
    flavor: standard.small

routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

wan:
  name: internet-connection
  cidr: 100.100.100.0/24

networks:
  - name: attacker-switch
    cidr: 10.10.10.0/24
    accessible_by_user: true

  - name: victim-switch
    cidr: 10.20.20.0/24
    accessible_by_user: false

  - name: analyst-switch
    cidr: 10.30.30.0/24
    accessible_by_user: true

net_mappings:
  - host: attacker
    network: attacker-switch
    ip: 10.10.10.5

  - host: analyst
    network: analyst-switch
    ip: 10.30.30.5

  - host: victim1
    network: victim-switch
    ip: 10.20.20.11

  - host: victim2
    network: victim-switch
    ip: 10.20.20.12

  - host: victim3
    network: victim-switch
    ip: 10.20.20.13

router_mappings:
  - router: router
    network: attacker-switch
    ip: 10.10.10.1

  - router: router
    network: victim-switch
    ip: 10.20.20.1

  - router: router
    network: analyst-switch
    ip: 10.30.30.1

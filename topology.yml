name: morris-worm

hosts:
  - name: attacker
    base_box:
      image: kali
      mgmt_user: debian
    flavor: standard.small

  - name: client
    base_box:
      image: ubuntu-20.04
      mgmt_user: ubuntu
    flavor: standard.small

  - name: server
    base_box:
      image: ubuntu-20.04
      mgmt_user: ubuntu
    flavor: standard.small

routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

wan:
  name: internet-connection
  cidr: 100.100.100.0/24

networks:
  - name: attacker-switch
    cidr: 10.1.10.0/24
    accessible_by_user: true

  - name: target-switch
    cidr: 10.1.20.0/24
    accessible_by_user: false

net_mappings:
  - host: attacker
    network: attacker-switch
    ip: 10.1.10.5

  - host: client
    network: attacker-switch
    ip: 10.1.10.6

  - host: server
    network: target-switch
    ip: 10.1.20.5

router_mappings:
  - router: router
    network: attacker-switch
    ip: 10.1.10.1

  - router: router
    network: target-switch
    ip: 10.1.20.1

groups:
  - name: user-accessible
    hosts:
      - attacker
      - client
